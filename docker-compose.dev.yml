services:
  web:
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port ${WEB_PORT}"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      WATCHPACK_POLLING: ${WATCHPACK_POLLING}
    volumes:
      - ./apps/web:/app
      - web-node-modules:/app/node_modules

volumes:
  web-node-modules:
