services:
  web:
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      WATCHPACK_POLLING: "true"
    volumes:
      - ./apps/web:/app
      - web-node-modules:/app/node_modules

volumes:
  web-node-modules:
