services:
  postgres:
    image: ${POSTGRES_IMAGE}
    container_name: edge-worldcup-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  mailpit:
    image: ${MAILPIT_IMAGE}
    container_name: edge-worldcup-mailpit
    ports:
      - "${SMTP_PORT}:1025"
      - "${MAILPIT_UI_PORT}:8025"

  api:
    build:
      context: ./apps/api
    container_name: edge-worldcup-api
    environment:
      PORT: ${API_PORT}
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      OTP_TTL_MINUTES: ${OTP_TTL_MINUTES}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_FROM: ${SMTP_FROM}
      BACKOFFICE_ADMIN_USER: ${BACKOFFICE_ADMIN_USER}
      BACKOFFICE_ADMIN_PASSWORD: ${BACKOFFICE_ADMIN_PASSWORD}
      BACKOFFICE_ADMIN_TOKEN: ${BACKOFFICE_ADMIN_TOKEN}
      WORLDCUP_IMPORT_URL: ${WORLDCUP_IMPORT_URL}
    depends_on:
      - postgres
      - mailpit
    ports:
      - "${API_PORT}:4000"

  web:
    build:
      context: ./apps/web
    container_name: edge-worldcup-web
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      - api
    ports:
      - "${WEB_PORT}:3000"

volumes:
  postgres-data:
