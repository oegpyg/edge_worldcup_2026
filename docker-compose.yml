services:
  postgres:
    image: postgres:16-alpine
    container_name: edge-worldcup-postgres
    environment:
      POSTGRES_DB: edge_worldcup
      POSTGRES_USER: edge_user
      POSTGRES_PASSWORD: edge_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit:v1.20
    container_name: edge-worldcup-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  api:
    build:
      context: ./apps/api
    container_name: edge-worldcup-api
    environment:
      PORT: 4000
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: edge_worldcup
      DATABASE_USER: edge_user
      DATABASE_PASSWORD: edge_password
      OTP_TTL_MINUTES: 10
      FRONTEND_ORIGIN: http://localhost:3000
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_FROM: no-reply@edgeworldcup.local
      BACKOFFICE_ADMIN_USER: admin
      BACKOFFICE_ADMIN_PASSWORD: admin1234
      BACKOFFICE_ADMIN_TOKEN: edge-backoffice-dev-token
      WORLDCUP_IMPORT_URL: ""
    depends_on:
      - postgres
      - mailpit
    ports:
      - "4000:4000"

  web:
    build:
      context: ./apps/web
    container_name: edge-worldcup-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres-data:
